<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <!-- Background verde -->
  <rect width="1024" height="500" fill="#4CAF50"/>

  <!-- Pattern decorativo leggero -->
  <rect x="0" y="0" width="1024" height="500" fill="url(#gradient)" opacity="0.3"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
  </defs>

  <!-- Logo E centrato -->
  <g transform="translate(512, 200)">
    <!-- Cerchio di sfondo per il logo -->
    <circle cx="0" cy="0" r="80" fill="#FFFFFF" opacity="0.2"/>

    <!-- Lettera E -->
    <g transform="scale(2.5)">
      <path fill="#FFFFFF" d="M-18,-24 L-18,24 L18,24 L18,18 L-10,18 L-10,3 L14,3 L14,-3 L-10,-3 L-10,-18 L18,-18 L18,-24 Z"/>

      <!-- Linee barcode -->
      <path fill="#FFFFFF" fill-opacity="0.3" d="M-24,-28 L-24,28 L-22,28 L-22,-28 Z"/>
      <path fill="#FFFFFF" fill-opacity="0.3" d="M22,-28 L22,28 L24,28 L24,-28 Z"/>
      <path fill="#FFFFFF" fill-opacity="0.2" d="M-28,-28 L-28,28 L-26,28 L-26,-28 Z"/>
      <path fill="#FFFFFF" fill-opacity="0.2" d="M26,-28 L26,28 L28,28 L28,-28 Z"/>
    </g>
  </g>

  <!-- Nome app -->
  <text x="512" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">E-Codes</text>

  <!-- Tagline -->
  <text x="512" y="390" font-family="Arial, sans-serif" font-size="24" fill="#E8F5E9" text-anchor="middle">Scanner Additivi Alimentari</text>

  <!-- Sottotitolo -->
  <text x="512" y="430" font-family="Arial, sans-serif" font-size="18" fill="#C8E6C9" text-anchor="middle">Scopri cosa mangi</text>
</svg>